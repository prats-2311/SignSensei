name: Deploy Frontend to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # These permissions are required for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud using Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/182928399501/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@signsensei.iam.gserviceaccount.com'
          
      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Inject Environment Variables from GitHub Secrets
      - name: Create .env.production
        working-directory: ./frontend
        run: |
          echo "VITE_API_BASE_URL=https://signsensei-api-182928399501.us-central1.run.app" >> .env.production
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env.production
          echo "VITE_FIREBASE_AUTH_DOMAIN=signsensei.firebaseapp.com" >> .env.production
          echo "VITE_FIREBASE_PROJECT_ID=signsensei" >> .env.production
          echo "VITE_FIREBASE_STORAGE_BUCKET=signsensei.firebasestorage.app" >> .env.production
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=182928399501" >> .env.production
          echo "VITE_FIREBASE_APP_ID=1:182928399501:web:14b50d9660897f0b8196c4" >> .env.production

      # 4. Install Dependencies and Build Frontend
      - name: Install and Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      # 4. Deploy to Firebase Hosting and update Firestore Rules/Indexes
      - name: Deploy to Firebase
        working-directory: ./frontend
        run: npx firebase-tools deploy --only hosting,firestore
        env:
          # Firebase CLI will automatically pick up the GOOGLE_APPLICATION_CREDENTIALS 
          # generated by the google-github-actions/auth step above.
          # We just need to ensure the project is set.
          FIREBASE_PROJECT: signsensei
